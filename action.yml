name: 'Publish to Google Play Console'
description: 'Publish a new Android app version to Google Play Console'

branding:
  icon: upload-cloud
  color: green

inputs:
  config_file:
    description: 'Path to the JSON publish configuration file (relative to GITHUB_WORKSPACE)'
    required: true
  playstore_encrypted_file:
    description: 'GPG-encrypted Google Play service account credentials (as a string)'
    required: true
  playstore_decryption_pwd:
    description: 'Passphrase used to decrypt playstore_encrypted_file'
    required: true

outputs:
  message:
    value: "Successful"
    description: 'Status message on successful publish'

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: |
        cd $GITHUB_ACTION_PATH
        pip install -r requirements.txt

    - name: Publish to Google Play
      shell: bash
      run: |
        cd $GITHUB_ACTION_PATH/src
        python main.py
      env:
        config_file: ${{ inputs.config_file }}
        playstore_encrypted_file: ${{ inputs.playstore_encrypted_file }}
        playstore_decryption_pwd: ${{ inputs.playstore_decryption_pwd }}
